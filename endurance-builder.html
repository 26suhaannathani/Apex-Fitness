<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endurance Builder - Apex Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="workout.css">
</head>
<body>
<div class="workout-container">
  <div class="left">
    <div>
      <h1 class="workout-title">Endurance Builder</h1>
      <div class="progress" id="progressText"></div>
      <div class="exercise-name" id="exerciseTitle"></div>
      <div class="steps" id="steps"></div>
    </div>
    <div class="bottom">
      <div class="timer" id="timer">30</div>
      <div class="buttons">
        <button onclick="goBack()">BACK</button>
        <button onclick="startTimer()">START</button>
        <button onclick="togglePause()" id="pauseBtn">PAUSE</button>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="exercise-list" id="exerciseList"></div>
    <button class="next-btn" onclick="nextExercise()">Next Exercise</button>
  </div>
</div>
<script>
window.exercises = [
  { name: "Squat to Punch", steps: ["Stand with feet shoulder-width apart and hands raised in a guard position.", "Lower into a squat keeping your chest up and back straight.", "As you rise up punch both arms forward at shoulder height.", "Return your hands to guard position and immediately go into the next rep."] },
  { name: "Lateral Lunges", steps: ["Stand tall with feet together and hands on your hips for balance.", "Step your right foot wide to the side and bend your right knee deeply.", "Keep your left leg straight and your chest upright as you lower down.", "Push off your right foot to return to centre and repeat on the left side."] },
  { name: "Inchworm", steps: ["Stand with feet hip-width apart then hinge forward and place hands on the floor.", "Walk your hands forward one at a time until you reach a plank position.", "Hold the plank for one second with your core tight and body straight.", "Walk your hands back toward your feet and stand up to complete one rep."] },
  { name: "Push-Up to Shoulder Tap", steps: ["Start in a full plank position with hands slightly wider than shoulder-width.", "Perform one standard push-up lowering your chest to just above the floor.", "At the top tap your right hand to your left shoulder while keeping your hips stable.", "Alternate the shoulder tap each rep keeping your core braced throughout."] },
  { name: "Jump Rope Simulation", steps: ["Stand upright with feet together and arms bent slightly at your sides.", "Begin hopping lightly on the balls of your feet with small controlled jumps.", "Rotate your wrists in small circles as if turning a skipping rope.", "Maintain a steady rhythm and keep your core engaged throughout."] }
];
</script>
<script src="workout.js"></script>
</body>
</html>
